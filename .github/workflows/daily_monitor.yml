name: Daily Apartment Monitor

on:
  schedule:
    # 04:00 UTC = ~07:00 Greek time (winter)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check-apartments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium + system deps
        run: python -m playwright install --with-deps chromium

      - name: Install xvfb (for headed Chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run apartment monitor (under xvfb)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
            python spitogatos_monitor.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_apartments.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Update seen apartments - $(date +'%Y-%m-%d %H:%M')"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
